<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Админка{% endblock %} - {{ service_name }}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/styles.css') }}">
</head>
<body>
    <header class="site-header admin-header">
        <a class="brand" href="/admin/materials">{{ service_name }}: админка</a>
        <nav class="top-nav" aria-label="Навигация админки">
            <a href="/admin/materials">Карточки</a>
            <a href="/admin/imports">Импорт JSON</a>
            <a href="/admin/reviews">Проверка</a>
            <a href="/">Сайт</a>
            {% if admin_user %}
                <form action="/admin/logout" method="post" class="inline-form">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                    <button type="submit" class="link-button">Выйти</button>
                </form>
            {% endif %}
        </nav>
    </header>
    <main class="page admin-page">
        {% if default_password_warning %}
            <div class="notice">
                Перед публичным запуском замените пароль администратора в переменной окружения ADMIN_PASSWORD.
            </div>
        {% endif %}
        {% block content %}{% endblock %}
    </main>
</body>
</html>
